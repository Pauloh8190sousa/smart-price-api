spring:
  application:
    name: smart-price-api

  flyway:
    enabled: true
    locations: classpath:db/migration

  # Banco de dados
  datasource:
    url: jdbc:postgresql://localhost:5432/smart-price-db
    username: postgres
    password: postgres

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update

    show-sql: false # Usar somente para desenvolvimento e verificar consultas, insert, update, create e delete feitas pelo hibernate

    properties:
      hibernate:
        format_sql: true

