spring:
  application:
    name: smart-price-api

  # Banco de dados
  datasource:
    url: jdbc:postgresql://localhost:5432/smart-price-db
    username: postgres
    password: postgres

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

server:
  port: 8080